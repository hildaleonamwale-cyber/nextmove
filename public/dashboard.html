<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --brand: #1FE6D4;
        --dark: #1A1C1E;
        --gray-text: #6B7280;
        --border-color: #F3F4F6; 
        --input-bg: #F9FAFB;
        --sidebar-width: 280px;
    }

    body { margin: 0; background-color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* =========================================
       DASHBOARD LAYOUT & SIDEBAR
       ========================================= */
    .nm-dash-wrapper { display: flex; height: 100vh; width: 100vw; overflow: hidden; background: #ffffff; position: relative; }

    .nm-sidebar { width: var(--sidebar-width); background: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 1000; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; }
    
    .nm-sidebar-header { padding: 30px 25px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; border-bottom: 1px solid var(--border-color); }
    .nm-logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nm-logo-wrap img { height: 35px; width: auto; }
    .nm-site-title { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .title-black { color: var(--dark); }
    .title-brand { color: var(--brand); }
    .nm-close-sidebar { display: none; background: none; border: none; font-size: 24px; color: var(--dark); cursor: pointer; padding: 0; }

    .nm-sidebar-menu { flex: 1; padding: 20px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .nm-nav-label { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 10px 10px; }
    
    .nm-nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; text-decoration: none; color: var(--gray-text); font-weight: 600; font-size: 14px; border-radius: 14px; transition: all 0.2s ease; cursor: pointer; }
    .nm-nav-item i { font-size: 18px; width: 22px; text-align: center; }
    .nm-nav-item:hover { background: var(--input-bg); color: var(--dark); }
    .nm-nav-item.active { background: var(--dark); color: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .nm-nav-item.active i { color: var(--brand); }

    .nm-sidebar-footer { padding: 20px 15px; border-top: 1px solid var(--border-color); }
    .nm-sidebar-profile-card { background: var(--input-bg); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); }
    .nm-sp-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; }
    .nm-sp-info { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .nm-sp-name { font-size: 13px; font-weight: 700; color: var(--dark); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .nm-sp-role { font-size: 11px; color: var(--gray-text); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .nm-logout { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--dark); background: #fff; border: 1px solid var(--border-color); font-weight: 600; text-decoration: none; padding: 12px; border-radius: 14px; transition: 0.2s; font-size: 13px; width: 100%; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
    .nm-logout:hover { background: var(--input-bg); border-color: #D1D5DB; }
    
    .nm-upsell-btn { display: none; background: linear-gradient(135deg, #1A1C1E 0%, #2d3136 100%); color: var(--brand); text-decoration: none; padding: 14px; border-radius: 14px; text-align: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: transform 0.2s; }
    .nm-upsell-btn:hover { transform: translateY(-2px); }

    .nm-sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; opacity: 0; visibility: hidden; transition: 0.4s ease; }

    /* =========================================
       MAIN CONTENT & DASHBOARD HEADER
       ========================================= */
    .nm-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; background: #ffffff; }

    /* Matching the user's requested we-header structure */
    .we-header-wrapper { position: sticky; top: 0; z-index: 90; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.03); flex-shrink: 0; }
    .we-header { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px 40px; border-bottom: 1px solid rgba(31, 230, 212, 0.15); transition: all 0.3s ease; }
    
    .nm-header-left { display: flex; align-items: center; gap: 20px; }
    .nm-mobile-hamburger { display: none; background: none; border: none; font-size: 24px; color: var(--dark); cursor: pointer; padding: 0; transition: 0.2s; }
    
    .nm-search-box { position: relative; width: 320px; }
    .nm-search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9CA3AF; font-size: 14px; }
    .nm-search-box input { width: 100%; background: var(--input-bg); border: 1px solid transparent; padding: 12px 16px 12px 44px; border-radius: 50px; outline: none; font-family: 'Inter', sans-serif; font-size: 13px; transition: 0.2s; box-sizing: border-box; }
    .nm-search-box input:focus { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31, 230, 212, 0.15); }

    .we-action-group { display: flex; align-items: center; gap: 15px; position: relative; }
    
    /* Notification Popover */
    .nm-notif-wrap { position: relative; }
    .nm-icon-btn { background: none; border: none; font-size: 22px; color: var(--gray-text); cursor: pointer; transition: 0.2s; position: relative; display: flex; align-items: center; justify-content: center; padding: 5px; }
    .nm-icon-btn:hover { color: var(--brand); }
    .nm-icon-btn::after { content: ''; position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 2px solid #fff; }
    
    .nm-notification-popover { position: absolute; top: calc(100% + 15px); right: -60px; width: 340px; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #D1D5DB; padding: 0; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10000; cursor: default; }
    .nm-notification-popover.active { opacity: 1; visibility: visible; transform: translateY(0); }
    .nm-notification-popover::before { content: ''; position: absolute; top: -6px; right: 70px; width: 12px; height: 12px; background: #fff; transform: rotate(45deg); border-left: 1px solid #D1D5DB; border-top: 1px solid #D1D5DB; }
    
    .nm-notif-header { padding: 15px 20px; border-bottom: 1px solid var(--input-bg); display: flex; justify-content: space-between; align-items: center; }
    .nm-notif-header h4 { margin: 0; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; color: var(--dark); }
    .nm-notif-mark { font-size: 11px; color: var(--brand); cursor: pointer; font-weight: 600; text-decoration: none; }
    .nm-notif-mark:hover { opacity: 0.8; }
    .nm-notif-list { display: flex; flex-direction: column; max-height: 320px; overflow-y: auto; }
    .nm-notif-item { padding: 15px 20px; border-bottom: 1px solid var(--input-bg); display: flex; gap: 15px; transition: 0.2s; cursor: pointer; position: relative; }
    .nm-notif-item:hover { background: var(--input-bg); }
    .nm-notif-item:last-child { border-bottom: none; }
    .nm-notif-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(31, 230, 212, 0.1); color: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
    .nm-notif-text { flex: 1; display: flex; flex-direction: column; gap: 4px;}
    .nm-notif-text p { margin: 0; font-size: 13px; color: var(--dark); line-height: 1.4; }
    .nm-notif-text span { font-size: 11px; color: var(--gray-text); }
    .nm-notif-item.unread .nm-notif-text p { font-weight: 600; }
    .nm-notif-item.unread::after { content: ''; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }

    /* Safety Tips Popover */
    .we-info-trigger { color: var(--gray-text); font-size: 22px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; }
    .we-info-trigger:hover { color: var(--brand); }
    .we-safety-popover { position: absolute; top: calc(100% + 15px); right: -10px; width: 280px; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); border: 1px solid #D1D5DB; padding: 20px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10000; cursor: default; }
    .we-safety-popover.active { opacity: 1; visibility: visible; transform: translateY(0); }
    .we-safety-popover::before { content: ''; position: absolute; top: -6px; right: 20px; width: 12px; height: 12px; background: #fff; transform: rotate(45deg); border-left: 1px solid #D1D5DB; border-top: 1px solid #D1D5DB; }
    .we-safety-header { display: flex; align-items: center; justify-content: space-between; font-family: 'Poppins', sans-serif; margin-bottom: 12px; }
    .we-safety-title-wrap { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: var(--dark); }
    .we-safety-title-wrap i { color: var(--brand); }
    .we-safety-learn { font-size: 11px; font-weight: 600; color: var(--brand); text-decoration: none; transition: 0.2s; }
    .we-safety-learn:hover { opacity: 0.8; }
    .we-story-indicators { display: flex; gap: 4px; margin-bottom: 15px; }
    .we-story-bar { flex: 1; height: 3px; background: var(--input-bg); border-radius: 4px; overflow: hidden; }
    .we-story-progress { height: 100%; width: 0%; background: var(--brand); transition: width 0.3s ease; }
    .we-safety-content { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--gray-text); line-height: 1.5; min-height: 55px; }
    .we-safety-nav { display: flex; justify-content: space-between; margin-top: 15px; align-items: center; }
    .we-safety-nav button { background: none; border: none; color: var(--dark); font-size: 12px; font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .we-safety-nav button:hover { background: var(--input-bg); }
    .we-safety-nav button:disabled { opacity: 0.3; cursor: not-allowed; background: none; }

    .we-plus-circle { width: 40px; height: 40px; background: var(--brand); color: #1A1C1E; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; box-shadow: 0 4px 12px rgba(31, 230, 212, 0.35); transition: 0.3s; cursor: pointer; border: none; flex-shrink: 0;}
    .we-plus-circle:hover { transform: rotate(90deg) scale(1.05); }

    .nm-user-profile { display: flex; align-items: center; gap: 12px; padding-left: 15px; border-left: 1px solid var(--border-color); }
    .nm-user-text { display: flex; flex-direction: column; text-align: right; }
    .nm-user-name { font-size: 13px; font-weight: 700; color: var(--dark); white-space: nowrap; }
    .nm-user-role { font-size: 11px; color: var(--gray-text); font-weight: 500; white-space: nowrap; }
    .nm-user-img { width: 40px; height: 40px; border-radius: 50%; background: #ccc; background-image: url('https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg?auto=compress&cs=tinysrgb&w=150'); background-size: cover; background-position: center; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex-shrink: 0; }

    .nm-content-scroll { flex: 1; padding: 35px 40px 60px 40px; overflow-y: auto; overflow-x: hidden; }
    
    /* =========================================
       REUSABLE UI COMPONENTS & CARDS
       ========================================= */
    .nm-view { display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .nm-page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; gap: 15px; flex-wrap: wrap; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
    .nm-page-header h1 { font-family: 'Poppins', sans-serif; font-size: 21px; font-weight: 800; color: var(--dark); margin: 0; letter-spacing: -0.5px; }
    .nm-page-header p { font-family: 'Poppins', sans-serif; color: var(--gray-text); font-size: 14px; margin: 4px 0 0 0; }
    
    .nm-card { background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); }
    .nm-table-card { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); overflow: hidden; }

    .nm-table-wrapper { width: 100%; overflow-x: auto; }
    .nm-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 700px; }
    .nm-table th { padding: 20px 25px; font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; color: var(--gray-text); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); background: #fafafa; white-space: nowrap; }
    .nm-table td { padding: 20px 25px; font-size: 13px; color: var(--dark); border-bottom: 1px solid var(--border-color); font-weight: 500; vertical-align: middle; }
    .nm-table tr:last-child td { border-bottom: none; }
    
    .nm-td-flex { display: flex; align-items: center; gap: 14px; }
    .nm-thumb { width: 60px; height: 45px; border-radius: 8px; background-size: cover; background-position: center; flex-shrink: 0; }
    .nm-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; font-family: 'Poppins', sans-serif; background-size: cover; background-position: center; flex-shrink: 0; }
    .nm-avatar.initials { background: rgba(31, 230, 212, 0.15); color: #0ba395; }
    .nm-info-text strong { display: block; color: var(--dark); margin-bottom: 2px; white-space: nowrap; font-size: 14px;}
    .nm-info-text span { font-size: 12px; color: var(--gray-text); font-weight: 400; white-space: nowrap; }
    
    .nm-badge { padding: 6px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; font-family: 'Poppins', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; white-space: nowrap; }
    .nm-badge.active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .nm-badge.pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    .nm-badge.sold { background: rgba(107, 114, 128, 0.1); color: #6b7280; }
    .nm-badge.brand { background: rgba(31, 230, 212, 0.15); color: #0ba395; }

    .nm-actions { display: flex; gap: 8px; }
    .nm-action-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border-color); background: #fff; color: var(--gray-text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
    .nm-action-btn:hover { border-color: var(--brand); color: var(--brand); box-shadow: 0 4px 10px rgba(31, 230, 212, 0.1); }
    .nm-action-btn.danger:hover { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.05); box-shadow: none; }
    .nm-action-btn.success:hover { border-color: #10b981; color: #10b981; background: rgba(16, 185, 129, 0.1); box-shadow: none; }

    /* Modern Forms */
    .nm-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .nm-form-group { display: flex; flex-direction: column; gap: 8px; }
    .nm-form-group.full { grid-column: 1 / -1; }
    .nm-form-label { font-size: 12px; font-weight: 700; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px;}
    .nm-form-input, .nm-form-textarea { width: 100%; padding: 15px 18px; border: 1px solid var(--border-color); border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--dark); background: var(--input-bg); outline: none; transition: 0.2s; box-sizing: border-box; }
    .nm-form-input:focus, .nm-form-textarea:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 4px rgba(31, 230, 212, 0.15); }
    .nm-form-textarea { resize: vertical; min-height: 120px; }
    
    /* Horizontal Filter Slider */
    .nm-filter-slider-container { width: 100%; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; margin-bottom: 25px; padding-bottom: 5px; }
    .nm-filter-slider-container::-webkit-scrollbar { display: none; }
    .nm-filter-pills { display: inline-flex; gap: 10px; }
    .nm-pill { padding: 10px 22px; border-radius: 50px; border: 1px solid var(--border-color); background: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--dark); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .nm-pill i { font-size: 14px; opacity: 0.7; }
    .nm-pill:hover { border-color: var(--dark); }
    .nm-pill.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .nm-pill.active i { opacity: 1; }

    /* PREMIUM BUTTONS */
    .nm-btn-save { background: var(--dark); color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); box-sizing: border-box; }
    .nm-btn-save i { color: var(--brand); font-size: 16px; }
    .nm-btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(31, 230, 212, 0.25); background: #2a2e33; }
    .nm-btn-save.whatsapp { background: #25D366; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); text-decoration: none; }
    .nm-btn-save.whatsapp i { color: #fff; }
    .nm-btn-save.whatsapp:hover { background: #20BA59; box-shadow: 0 12px 25px rgba(37, 211, 102, 0.3); }
    .nm-btn-outline { background: transparent; border: 1px solid var(--brand); color: var(--dark); padding: 6px 14px; font-size: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-family: 'Inter', sans-serif; font-weight: 600;}
    .nm-btn-outline:hover { background: rgba(31, 230, 212, 0.1); transform: translateY(-2px); }

    /* =========================================
       SPECIFIC VIEWS
       ========================================= */
    .nm-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .nm-stat-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; position: relative; overflow: hidden; }
    .nm-stat-icon { width: 48px; height: 48px; background: var(--input-bg); color: var(--dark); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border-color); }
    .nm-stat-card.highlight .nm-stat-icon { background: rgba(31, 230, 212, 0.15); color: #0ebfae; border: none; }
    .nm-stat-label { font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 700; color: var(--gray-text); text-transform: uppercase; letter-spacing: 1px; }
    .nm-stat-value { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 800; color: var(--dark); line-height: 1; }
    .nm-stat-trend { position: absolute; top: 25px; right: 25px; font-size: 12px; font-weight: 700; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 5px 10px; border-radius: 8px; display: flex; align-items: center; gap: 4px; }
    
    .nm-bottom-grid { display: grid; grid-template-columns: 2.5fr 1fr; gap: 25px; }
    .nm-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .nm-section-header h3 { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 800; margin: 0; color: var(--dark); }

    .nm-activity-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--border-color); }
    .nm-activity-row:last-child { border-bottom: none; }
    .nm-activity-label { font-size: 13px; color: var(--gray-text); font-weight: 500; display: flex; align-items: center; gap: 12px; }
    .nm-activity-label .dot { width: 10px; height: 10px; border-radius: 50%; }
    .nm-activity-value { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: var(--dark); }
    .nm-progress-bg { height: 8px; background: var(--input-bg); border-radius: 10px; overflow: hidden; margin-top: 12px; }
    .nm-progress-fill { height: 100%; width: 85%; background: var(--brand); border-radius: 10px; }

    .nm-dark-card { background: linear-gradient(145deg, #1A1C1E 0%, #2a2e33 100%); color: white; border: none; }
    .nm-dark-card h3, .nm-dark-card h2 { color: #fff; }
    .nm-dark-card .nm-form-label { color: #9CA3AF; }
    .nm-dark-card .nm-gray-text { color: #9CA3AF; }

    /* Paywall */
    .nm-paywall-container { position: relative; width: 100%; height: 500px; border-radius: 24px; overflow: hidden; background: #fff; border: 1px solid var(--border-color); }
